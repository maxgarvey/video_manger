<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Manger</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-morph@2.0.1"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #000;
      color: #eee;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Player fills available height above the info panel */
    #player {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      z-index: 10;
    }

    /* ── Overlay chrome ─────────────────────────────────────────────────
       Chrome elements (toggle buttons) are invisible at rest and fade in
       on body hover or while a panel is open.                           */
    .chrome {
      position: fixed;
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    body:hover .chrome,
    body.lib-open .chrome,
    body.cfg-open .chrome {
      opacity: 1;
      pointer-events: auto;
    }
    .chrome-btn {
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #eee;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      backdrop-filter: blur(6px);
    }
    .chrome-btn:hover { background: rgba(50, 50, 50, 0.85); }

    /* Library button — top left */
    #lib-btn { top: 1rem; left: 1rem; }

    /* Info button — bottom right; scrolls to info panel */
    #info-btn { bottom: 1rem; right: 1rem; }

    /* Config button — top right; slides left when config panel is open */
    #cfg-btn { top: 1rem; right: 1rem; transition: opacity 0.2s, right 0.22s ease; }
    body.cfg-open #cfg-btn { right: 272px; }

    /* ── Config panel ────────────────────────────────────────────────── */
    #config-panel {
      position: fixed;
      z-index: 200;
      top: 0; right: 0; bottom: 0;
      width: 260px;
      background: rgba(18, 18, 18, 0.96);
      backdrop-filter: blur(10px);
      border-left: 1px solid #2a2a2a;
      overflow-y: auto;
      padding: 1rem;
      transform: translateX(100%);
      transition: transform 0.22s ease;
    }
    body.cfg-open #config-panel { transform: translateX(0); }

    /* ── Library full-pane overlay ──────────────────────────────────── */
    #library {
      position: fixed;
      z-index: 200;
      inset: 0;
      background: rgba(8, 8, 8, 0.80);
      backdrop-filter: blur(14px);
      display: flex;
      flex-direction: row;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    body.lib-open #library { opacity: 1; pointer-events: auto; }

    /* Left controls column */
    #lib-left {
      width: 280px;
      flex-shrink: 0;
      background: rgba(18, 18, 18, 0.72);
      border-right: 1px solid #2a2a2a;
      overflow-y: auto;
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* Right video-list column */
    #lib-right {
      flex: 1;
      overflow: hidden;
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      min-width: 0;
    }
    #lib-right #video-list { flex: 1; overflow-y: auto; min-height: 0; }

    /* ── Info panel — always-visible strip below the player ──────────── */
    #info-panel {
      background: rgba(20, 20, 20, 0.96);
      border-top: 1px solid #2a2a2a;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      flex-shrink: 0;
      height: min(300px, 38vh);
      overflow-y: auto;
      transition: height 0.2s ease;
    }
    body.info-collapsed #info-panel { height: 0; padding: 0; overflow: hidden; }

    /* ── Library widget styles ──────────────────────────────────────── */
    section h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      margin-bottom: 0.6rem;
    }
    input[type=text] {
      background: #222;
      border: 1px solid #444;
      color: #eee;
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      font-size: 0.85rem;
      width: 100%;
    }
    button, .btn {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #ccc;
      padding: 0.35rem 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: inherit;
    }
    button:hover, .btn:hover { background: #333; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.78rem; }
    .btn-danger { background: #2a1515; border-color: #5a2a2a; color: #f08080; }
    .btn-danger:hover { background: #331515; }
    .btn-success { background: #1a3a1a; border-color: #3a6a3a; color: #8f8; }
    .btn-success:hover { background: #1e4a1e; }
    .btn-ghost { background: none; border-color: #3a3a3a; color: #666; }
    .btn-ghost:hover { background: #1e1e1e; }
    .btn-active-filter { background: #2a3a2a; border-color: #4a7a4a; color: #8f8; }
    .btn-icon { background: none; border: none; color: #555; padding: 0.2rem 0.35rem; line-height: 1; }
    .btn-icon:hover { background: none; color: #888; }
    .tag-filter-list { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    /* ── htmx loading states ────────────────────────────────────────── */
    .htmx-indicator { opacity: 0; transition: opacity 0.2s ease; }
    .htmx-indicator.htmx-request,
    .htmx-request .htmx-indicator { opacity: 1; }
    button.htmx-request { opacity: 0.55; cursor: wait; }
    #video-list { transition: opacity 0.15s ease; }
    #video-list.htmx-request { opacity: 0.45; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 0.65rem; height: 0.65rem;
      border: 2px solid #444; border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    /* ── Multi-tab player ───────────────────────────────────────────── */
    #tab-panes { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .tab-pane { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; }
    .tab-pane.active { display: flex; }
    #tab-strip {
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      z-index: 95;
      display: none;
      gap: 0.2rem;
      padding: 0.3rem 0.5rem;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(8px);
      border-radius: 0 0 8px 8px;
      max-width: 70vw;
      overflow-x: auto;
      align-items: center;
    }
    .tab-btn {
      background: rgba(35, 35, 35, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #999;
      padding: 0.18rem 0.4rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.72rem;
      white-space: nowrap;
      display: flex; align-items: center; gap: 0.25rem;
      flex-shrink: 0; user-select: none;
    }
    .tab-btn.active { background: rgba(60, 60, 60, 0.95); color: #ddd; border-color: rgba(255,255,255,0.22); }
    .tab-label { overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
    .tab-close { background: none; border: none; color: #555; cursor: pointer; font-size: 0.62rem; padding: 0; line-height: 1; flex-shrink: 0; }
    .tab-close:hover { color: #f08080; }

    /* ── Player hover overlay ──────────────────────────────────────── */
    #player-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.82));
      padding: 3rem 1.5rem 1rem;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    .tab-pane:hover #player-overlay { opacity: 1; }

    /* ── Details / summary disclosure ──────────────────────────────── */
    details > summary {
      list-style: none;
      cursor: pointer;
      user-select: none;
      color: #666;
    }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::before {
      content: '▶';
      display: inline-block;
      font-size: 0.55em;
      margin-right: 0.35em;
      transition: transform 0.15s ease;
      opacity: 0.6;
      vertical-align: middle;
    }
    details[open] > summary::before { transform: rotate(90deg); opacity: 1; }
    details[open] > summary { color: #999; }
  </style>
</head>
<body class="info-collapsed">

  <!-- Tab strip — only visible when ≥2 tabs are open -->
  <div id="tab-strip"></div>

  <!-- Full-screen player area — tab panes inserted here by JS -->
  <main id="player">
    <div id="tab-panes">
      <p style="color:#444">Loading…</p>
    </div>
  </main>

  <!-- Library toggle button — top left -->
  <div class="chrome" id="lib-btn">
    <button class="chrome-btn" onclick="document.body.classList.toggle('lib-open')">☰ Library</button>
  </div>

  <!-- Info button — bottom right; collapses/expands the info panel -->
  <div class="chrome" id="info-btn">
    <button class="chrome-btn" onclick="document.body.classList.toggle('info-collapsed')" title="Toggle info panel">▾ Info</button>
  </div>

  <!-- Config toggle button — top right -->
  <div class="chrome" id="cfg-btn">
    <button class="chrome-btn" onclick="document.body.classList.toggle('cfg-open')">⚙ Settings</button>
  </div>

  <!-- Library full-pane overlay -->
  <aside id="library">

    <!-- Left column: management controls -->
    <div id="lib-left">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;color:#555;font-weight:600">Library</span>
        <button class="btn-icon" onclick="document.body.classList.remove('lib-open')"
          style="font-size:1.2rem"
          title="Close library">✕</button>
      </div>
      <details>
        <summary style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem">
          Directories
        </summary>
        <div style="display:flex;flex-direction:column;gap:0.4rem;margin-top:0.5rem">
          <div id="directories" hx-get="/directories" hx-trigger="load"></div>
          <button class="btn-sm" hx-get="/fs" hx-target="#dir-browser-wrap" hx-swap="innerHTML"
            style="text-align:left">
            📁 Browse to add folder…
          </button>
          <div id="dir-browser-wrap"></div>
          <details style="margin-top:0.1rem">
            <summary style="font-size:0.78rem">Create new folder on disk</summary>
            <form hx-post="/directories/create" hx-target="#directories" style="display:flex;gap:0.4rem;margin-top:0.4rem">
              <input type="text" name="path" placeholder="/path/to/new/folder">
              <button type="submit" title="Create folder on disk and add to library">New</button>
            </form>
          </details>
        </div>
      </details>
      <details id="drop-import-section">
        <summary style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem">
          Drop to import
        </summary>
        <div style="margin-top:0.5rem;display:flex;flex-direction:column;gap:0.4rem">
          <label style="font-size:0.78rem;color:#aaa">Target directory</label>
          <select id="drop-dir-select"
            style="background:#222;border:1px solid #444;color:#eee;padding:0.3rem 0.5rem;border-radius:4px;font-size:0.82rem"
            hx-get="/directories/options" hx-trigger="load" hx-target="this"></select>
          <div id="drop-zone"
            style="border:2px dashed #444;border-radius:6px;padding:1.5rem 1rem;text-align:center;font-size:0.82rem;color:#666;cursor:pointer;transition:border-color 0.15s,color 0.15s">
            📂 Drop video files or folders here
          </div>
          <div id="drop-status" style="font-size:0.78rem;color:#888;min-height:1.2em"></div>
        </div>
      </details>
      <details>
        <summary style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem">
          Download from URL
        </summary>
        <div style="margin-top:0.5rem;display:flex;flex-direction:column;gap:0.4rem">
          <form hx-post="/ytdlp/download" hx-target="#ytdlp-output"
                style="display:flex;flex-direction:column;gap:0.4rem">
            <input type="text" name="url" placeholder="YouTube / video URL">
            <select name="dir_id" id="ytdlp-dir-select"
              style="background:#222;border:1px solid #444;color:#eee;padding:0.4rem 0.5rem;border-radius:4px;font-size:0.85rem"
              hx-get="/directories/options" hx-trigger="load" hx-target="this"></select>
            <button type="submit">⬇ Download</button>
          </form>
          <div id="ytdlp-output" style="margin-top:0.4rem;display:flex;flex-direction:column;gap:0.3rem"></div>
        </div>
      </details>
      <section>
        <h2>Filter by Rating</h2>
        <input type="hidden" id="active-rating" value="">
        <div style="display:flex;gap:0.3rem;flex-wrap:wrap">
          <button class="btn-sm" id="rating-btn-1"
            onclick="toggleRatingFilter(1)"
            style="border-radius:12px">👍 Liked</button>
          <button class="btn-sm" id="rating-btn-2"
            onclick="toggleRatingFilter(2)"
            style="border-radius:12px">⭐ Favs</button>
        </div>
      </section>
      <section>
        <h2>Filter by Tag</h2>
        <div id="tag-filters" hx-get="/tags" hx-trigger="load"></div>
        <button hx-get="/videos" hx-target="#video-list"
          onclick="document.getElementById('video-search').value='';document.getElementById('active-tag').value='';document.getElementById('active-rating').value='';updateRatingBtns()"
          style="margin-top:0.4rem;width:100%">Show all</button>
      </section>
    </div>

    <!-- Right column: video list -->
    <div id="lib-right">
      <div style="display:flex;align-items:center;gap:0.5rem">
        <h2 style="display:flex;align-items:center;gap:0.4rem;flex-shrink:0">
          Videos <span id="vl-spin" class="spinner htmx-indicator"></span>
        </h2>
        <input id="video-search" type="text" name="q" placeholder="Search…"
          hx-get="/videos"
          hx-target="#video-list"
          hx-trigger="input changed delay:150ms"
          hx-indicator="#vl-spin"
          hx-on:htmx:before-request="document.getElementById('active-tag').value=''"
          style="flex:1;margin:0">
        <button class="btn-sm" style="flex-shrink:0;font-size:0.7rem"
          title="Open next unwatched video"
          onclick="(function(){
            var tid = document.getElementById('active-tag').value;
            fetch('/videos/next-unwatched' + (tid ? '?tag_id='+tid : ''))
              .then(function(r){ if(!r.ok) throw r; return r.json(); })
              .then(function(d){ openTab(d.id, d.title); })
              .catch(function(){ var n=document.createElement('span');
                n.textContent='All watched!';n.style.cssText='color:#4a9;font-size:0.75rem';
                document.getElementById('vl-spin').after(n);setTimeout(function(){n.remove()},2500); });
          })()">▶ Next</button>
      </div>
      <input type="hidden" id="active-tag" name="tag_id" value="">
      <div id="video-list"
           hx-ext="morph"
           hx-get="/videos"
           hx-trigger="load, every 60s"
           hx-swap="morph:innerHTML"
           hx-include="#video-search,#active-tag"
           hx-indicator="#vl-spin"></div>
    </div>

  </aside>

  <!-- Info panel — always visible below the sticky player; updated via hx-swap-oob by player.html -->
  <div id="info-panel">
    <p style="color:#555;font-size:0.82rem">Select a video to see details.</p>
  </div>

  <!-- Config panel overlay -->
  <div id="config-panel">
    <div style="display:flex;justify-content:flex-end;margin-bottom:0.5rem">
      <button class="btn-icon" onclick="document.body.classList.remove('cfg-open')"
        style="font-size:1.2rem"
        title="Close settings">✕</button>
    </div>
    <div id="settings-panel" hx-get="/settings" hx-trigger="load"></div>
  </div>

  <script>
    // ── Multi-tab player system ─────────────────────────────────────
    const videoTabs = {}; // videoId → { pane, tabBtn }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function openTab(videoId, title) {
      // If already open, just switch to it
      if (videoTabs[videoId]) {
        activateTab(videoId);
        document.body.classList.remove('lib-open');
        return;
      }

      const resp = await fetch('/play/' + videoId);
      if (!resp.ok) return;
      const html = await resp.text();

      // Parse response into a DocumentFragment
      const tmpl = document.createElement('template');
      tmpl.innerHTML = html;
      const frag = tmpl.content;

      // Process htmx OOB swaps (e.g. #info-panel)
      frag.querySelectorAll('[hx-swap-oob]').forEach(function(el) {
        var target = document.getElementById(el.id);
        if (target) { target.innerHTML = el.innerHTML; htmx.process(target); }
        el.remove();
      });

      // Create tab pane from remaining fragment
      var pane = document.createElement('div');
      pane.className = 'tab-pane';
      pane.appendChild(frag);

      // Remove any stale loading placeholder on first tab
      var placeholder = document.getElementById('tab-panes').querySelector('p');
      if (placeholder) placeholder.remove();
      document.getElementById('tab-panes').appendChild(pane);

      // Re-execute inline scripts (progress tracking etc.)
      pane.querySelectorAll('script').forEach(function(orig) {
        var s = document.createElement('script');
        s.textContent = orig.textContent;
        document.head.appendChild(s).remove();
        orig.remove();
      });
      htmx.process(pane);

      // Create tab button
      var tabBtn = document.createElement('div');
      tabBtn.className = 'tab-btn';
      tabBtn.title = title;
      tabBtn.onclick = function() { activateTab(videoId); };
      tabBtn.innerHTML =
        '<span class="tab-label">' + escHtml(title) + '</span>' +
        '<button class="tab-close" onclick="event.stopPropagation();closeTab(' + videoId + ')">✕</button>';
      document.getElementById('tab-strip').appendChild(tabBtn);

      videoTabs[videoId] = { pane: pane, tabBtn: tabBtn };
      activateTab(videoId);
      updateTabStrip();
      document.body.classList.remove('lib-open');
    }

    function activateTab(videoId) {
      Object.keys(videoTabs).forEach(function(id) {
        var t = videoTabs[id];
        var active = (id == videoId);
        t.pane.classList.toggle('active', active);
        t.tabBtn.classList.toggle('active', active);
        if (!active) {
          var v = t.pane.querySelector('video');
          if (v && !v.paused) v.pause();
        }
      });
      // Refresh the info panel to match the newly-active tab.
      fetch('/play/' + videoId).then(function(r) { return r.text(); }).then(function(html) {
        var frag = document.createElement('template');
        frag.innerHTML = html;
        frag.content.querySelectorAll('[hx-swap-oob]').forEach(function(el) {
          var target = document.getElementById(el.id);
          if (target) { target.innerHTML = el.innerHTML; htmx.process(target); }
          el.remove();
        });
      }).catch(function(){});
    }

    function closeTab(videoId) {
      var tab = videoTabs[videoId];
      if (!tab) return;
      // Pause the video before removing
      var v = tab.pane.querySelector('video');
      if (v) v.pause();
      tab.pane.remove();
      tab.tabBtn.remove();
      delete videoTabs[videoId];
      var remaining = Object.keys(videoTabs);
      if (remaining.length > 0) {
        activateTab(remaining[remaining.length - 1]);
      } else {
        document.getElementById('tab-panes').innerHTML = '<p style="color:#444">Select a video from the library.</p>';
        document.getElementById('info-panel').innerHTML = '<p style="color:#555;font-size:0.82rem">Select a video to see details.</p>';
      }
      updateTabStrip();
    }

    function updateTabStrip() {
      document.getElementById('tab-strip').style.display =
        Object.keys(videoTabs).length > 1 ? 'flex' : 'none';
    }

    // Auto-load a random video on start
    fetch('/random-video').then(function(r) {
      return r.ok ? r.json() : null;
    }).then(function(d) {
      if (d) openTab(d.id, d.title);
    });

    // ── Drag-and-drop import ────────────────────────────────────────
    (function () {
      var VIDEO_EXTS = /\.(mp4|mkv|avi|mov|webm|flv|wmv|m4v|ts|m2ts|vob|ogv|3gp|mpeg|mpg|divx|xvid)$/i;

      function isVideoFile(name) { return VIDEO_EXTS.test(name); }

      // Recursively collect File objects from a FileSystemEntry.
      // Handles readEntries pagination (max 100 entries per batch).
      function collectFiles(entry) {
        return new Promise(function (resolve) {
          if (entry.isFile) {
            entry.file(function (f) { resolve([f]); }, function () { resolve([]); });
          } else if (entry.isDirectory) {
            var reader = entry.createReader();
            var all = [];
            function readBatch() {
              reader.readEntries(function (batch) {
                if (!batch.length) {
                  Promise.all(all.map(collectFiles)).then(function (arrs) {
                    resolve(arrs.reduce(function (a, b) { return a.concat(b); }, []));
                  });
                  return;
                }
                all = all.concat(Array.from(batch));
                readBatch();
              }, function () { resolve([]); });
            }
            readBatch();
          } else {
            resolve([]);
          }
        });
      }

      var zone = document.getElementById('drop-zone');
      var statusEl = document.getElementById('drop-status');

      zone.addEventListener('dragover', function (e) {
        e.preventDefault();
        zone.style.borderColor = '#4a9a4a';
        zone.style.color = '#8f8';
      });
      zone.addEventListener('dragleave', function () {
        zone.style.borderColor = '#444';
        zone.style.color = '#666';
      });
      zone.addEventListener('drop', function (e) {
        e.preventDefault();
        zone.style.borderColor = '#444';
        zone.style.color = '#666';

        var dirId = document.getElementById('drop-dir-select').value;
        if (!dirId) {
          statusEl.textContent = '⚠ Select a target directory first.';
          return;
        }

        var items = Array.from(e.dataTransfer.items || []);
        var entries = items.map(function (it) {
          return it.webkitGetAsEntry && it.webkitGetAsEntry();
        }).filter(Boolean);

        if (!entries.length) {
          statusEl.textContent = '⚠ No items dropped.';
          return;
        }

        statusEl.textContent = 'Collecting files…';

        Promise.all(entries.map(collectFiles)).then(function (arrs) {
          var files = arrs.reduce(function (a, b) { return a.concat(b); }, [])
                         .filter(function (f) { return isVideoFile(f.name); });
          if (!files.length) {
            statusEl.textContent = '⚠ No supported video files found.';
            return;
          }
          var total = files.length;
          var done = 0;
          var errors = 0;

          function uploadNext(idx) {
            if (idx >= files.length) {
              var msg = '✓ ' + (done - errors) + ' / ' + total + ' files imported.';
              if (errors) msg += ' (' + errors + ' failed)';
              statusEl.textContent = msg;
              // Refresh video list
              htmx.ajax('GET', '/videos', {target: '#video-list', swap: 'innerHTML'});
              return;
            }
            var f = files[idx];
            statusEl.textContent = 'Uploading ' + f.name + ' (' + (idx + 1) + ' / ' + total + ')…';
            var fd = new FormData();
            fd.append('file', f);
            fd.append('dir_id', dirId);
            fd.append('filename', f.name);
            fetch('/import/upload', {method: 'POST', body: fd}).then(function (resp) {
              done++;
              if (!resp.ok) errors++;
              uploadNext(idx + 1);
            }).catch(function () {
              done++; errors++;
              uploadNext(idx + 1);
            });
          }
          uploadNext(0);
        });
      });
    })();

    // ── Rating filter toggle ────────────────────────────────────────
    function toggleRatingFilter(rating) {
      var ar = document.getElementById('active-rating');
      if (ar.value == rating) {
        // Already active — clicking again clears the filter.
        ar.value = '';
        htmx.ajax('GET', '/videos', {target: '#video-list', swap: 'innerHTML'});
      } else {
        ar.value = rating;
        document.getElementById('video-search').value = '';
        document.getElementById('active-tag').value = '';
        htmx.ajax('GET', '/videos?rating=' + rating, {target: '#video-list', swap: 'innerHTML'});
      }
      updateRatingBtns();
    }

    function updateRatingBtns() {
      var ar = document.getElementById('active-rating').value;
      [1, 2].forEach(function(r) {
        var btn = document.getElementById('rating-btn-' + r);
        if (btn) btn.classList.toggle('btn-active-filter', String(r) === String(ar));
      });
    }

    // Keyboard shortcuts: L=library  I=scroll-to-info  S=settings  Esc=close all
    document.addEventListener('keydown', function(e) {
      if (e.target.matches('input, textarea, select') || e.target.isContentEditable) return;
      if (e.ctrlKey || e.altKey || e.metaKey) return;
      if (e.key === 'l' || e.key === 'L') {
        document.body.classList.toggle('lib-open');
      } else if (e.key === 'i' || e.key === 'I') {
        document.getElementById('info-panel').scrollIntoView({behavior: 'smooth'});
      } else if (e.key === 's' || e.key === 'S') {
        document.body.classList.toggle('cfg-open');
      } else if (e.key === 'Escape') {
        document.body.classList.remove('lib-open', 'cfg-open');
      }
    });
  </script>

</body>
</html>
