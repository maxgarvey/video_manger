    // ── Rating filter toggle ────────────────────────────────────────
    function toggleRatingFilter(rating) {
      var ar = document.getElementById('active-rating');
      if (ar.value == rating) {
        // Already active — clicking again clears the filter.
        ar.value = '';
        htmx.ajax('GET', '/videos', {target: '#video-list', swap: 'innerHTML'});
      } else {
        ar.value = rating;
        document.getElementById('video-search').value = '';
        document.getElementById('active-tag').value = '';
        htmx.ajax('GET', '/videos?rating=' + rating, {target: '#video-list', swap: 'innerHTML'});
      }
      updateRatingBtns();
    }

    function updateRatingBtns() {
      var ar = document.getElementById('active-rating').value;
      [1, 2].forEach(function(r) {
        var btn = document.getElementById('rating-btn-' + r);
        if (btn) btn.classList.toggle('btn-active-filter', String(r) === String(ar));
      });
    }

    function toggleTypeFilter(type) {
      var at = document.getElementById('active-type');
      if (at.value === type) {
        at.value = '';
      } else {
        at.value = type;
      }
      // build query string preserving other filters
      var params = [];
      var searchVal = document.getElementById('video-search').value;
      if (searchVal) params.push('q=' + encodeURIComponent(searchVal));
      var tagVal = document.getElementById('active-tag').value;
      if (tagVal) params.push('tag_id=' + encodeURIComponent(tagVal));
      var ratingVal = document.getElementById('active-rating').value;
      if (ratingVal) params.push('rating=' + encodeURIComponent(ratingVal));
      if (at.value) params.push('type=' + encodeURIComponent(at.value));
      var url = '/videos' + (params.length ? '?' + params.join('&') : '');
      htmx.ajax('GET', url, {target: '#video-list', swap: 'innerHTML'});
      updateRatingBtns();
      updateTagBtns();
    }

    // Keyboard shortcuts: L=library  I=scroll-to-info  S=settings  →=random  Esc=close all
    // ── Roku live-detection ───────────────────────────────────────────
    // Poll /roku/connected every 4 s. Toggle .roku-live on <body> so the
    // Cast button appears only when the Roku app is actively running.
    (function() {
      function checkRoku() {
        fetch('/roku/connected').then(function(r) {
          document.body.classList.toggle('roku-live', r.ok);
        }).catch(function() {
          document.body.classList.remove('roku-live');
        });
      }
      checkRoku();
      setInterval(checkRoku, 4000);
    })();

    // Returns the <video> element of the active (or only) tab pane.
    function activeVideo() {
      var active = document.querySelector('.tab-pane.active');
      if (!active) active = document.querySelector('.tab-pane');
      return active ? active.querySelector('video') : null;
    }

    // Keyboard shortcuts: L=library  I=scroll-to-info  S=settings  →=random  Esc=close all
    // Space=play/pause  P=parallel  F=fullscreen  M=mute  N=next-unwatched
    // J=seek-10s  K=seek+10s  ←=seek-5s
    document.addEventListener('keydown', function(e) {
      if (e.target.matches('input, textarea, select') || e.target.isContentEditable) return;
      if (e.ctrlKey || e.altKey || e.metaKey) return;
      if (e.key === 'l' || e.key === 'L') {
        toggleLib();
      } else if (e.key === 'i' || e.key === 'I') {
        document.getElementById('info-panel').scrollIntoView({behavior: 'smooth'});
      } else if (e.key === 's' || e.key === 'S') {
        toggleCfg();
      } else if (e.key === 'ArrowRight') {
        pickRandomVideo().then(function(d) {
          if (d) openTab(d.id, d.title);
        });
      } else if (e.key === 'Escape') {
        closeAllPanels();
      } else if (e.key === ' ') {
        var v = activeVideo();
        if (v) { e.preventDefault(); if (v.paused) v.play(); else v.pause(); }
      } else if (e.key === 'p' || e.key === 'P') {
        toggleParallelMode();
      } else if (e.key === 'f' || e.key === 'F') {
        var v = activeVideo();
        if (v && v.requestFullscreen) v.requestFullscreen();
      } else if (e.key === 'm' || e.key === 'M') {
        var v = activeVideo();
        if (v) v.muted = !v.muted;
      } else if (e.key === 'n' || e.key === 'N') {
        var tid = document.getElementById('active-tag') ? document.getElementById('active-tag').value : '';
        fetch('/videos/next-unwatched' + (tid ? '?tag_id=' + tid : ''))
          .then(function(r){ if(!r.ok) throw r; return r.json(); })
          .then(function(d){ openTab(d.id, d.title); })
          .catch(function(){});
      } else if (e.key === 'j' || e.key === 'J') {
        var v = activeVideo();
        if (v) v.currentTime = Math.max(0, v.currentTime - 10);
      } else if (e.key === 'k' || e.key === 'K') {
        var v = activeVideo();
        if (v) v.currentTime = v.currentTime + 10;
      } else if (e.key === 'ArrowLeft') {
        var v = activeVideo();
        if (v) { e.preventDefault(); v.currentTime = Math.max(0, v.currentTime - 5); }
      }
    });
  </script>

  <script>
    // Open the trimmed video in a new tab when trim completes.
    document.body.addEventListener('trimComplete', function(e) {
      var d = e.detail;
      if (d && d.videoId) openTab(d.videoId, d.title || 'Trimmed video');
    });

    // ── Thumbnail hover preview ──────────────────────────────────────
    function showThumb(e, id) {
      var f = document.getElementById('thumb-float');
      var img = document.getElementById('thumb-float-img');
      if (!f || !img) return;
      img.src = '/videos/' + id + '/thumbnail';
      f.style.display = 'block';
      var x = e.clientX + 18, y = e.clientY - 90;
      if (x + 220 > window.innerWidth) x = e.clientX - 220;
      if (y < 8) y = e.clientY + 18;
      f.style.left = x + 'px';
      f.style.top = y + 'px';
    }
    function hideThumb() {
      var f = document.getElementById('thumb-float');
      if (f) f.style.display = 'none';
    }

    // ── Capture thumbnail from current video position ────────────────
    function captureThumb(id) {
      var vid = document.getElementById('vid-' + id);
      var pos = (vid && vid.duration) ? (vid.currentTime / vid.duration).toFixed(4) : '0.5';
      var status = document.getElementById('thumb-status-' + id);
      if (status) status.textContent = '…';
      fetch('/videos/' + id + '/thumbnail?position=' + pos, {method: 'POST'})
        .then(function(r) {
          if (!r.ok) throw new Error(r.status);
          var t = Date.now();
          var img = document.getElementById('thumb-img-' + id);
          var wrap = document.getElementById('thumb-wrap-' + id);
          if (!img && wrap) {
            img = document.createElement('img');
            img.id = 'thumb-img-' + id;
            img.alt = 'Thumbnail';
            img.style.cssText = 'width:80px;height:auto;border:1px solid #444;border-radius:4px;display:block';
            wrap.appendChild(img);
          }
          if (img) {
            img.src = '/videos/' + id + '/thumbnail?t=' + t;
          }
          // Wire up hover preview on the sidebar button if it wasn't before
          var btn = document.querySelector('[data-id="' + id + '"]');
          if (btn && !btn._thumbHooked) {
            btn._thumbHooked = true;
            btn.addEventListener('mouseenter', function(e) { showThumb(e, id); });
            btn.addEventListener('mouseleave', hideThumb);
          }
          if (status) { status.textContent = '✓'; setTimeout(function(){ status.textContent=''; }, 2000); }
        })
        .catch(function() {
          if (status) { status.textContent = 'failed'; setTimeout(function(){ status.textContent=''; }, 3000); }
        });
    }
  </script>

  <!-- ── Multi-select logic ────────────────────────────────────────── -->
  <script>
    var _msIDs = new Set();

    function msToggleMode() {
      var active = document.body.classList.toggle('multi-select-mode');
      document.getElementById('ms-select-btn').classList.toggle('active', active);
      if (!active) msClearSelection();
      document.querySelectorAll('#video-list .vid-select-cb').forEach(function(cb) {
        cb.style.display = active ? 'inline-flex' : 'none';
      });
    }

    function msToggle(id, li) {
      if (_msIDs.has(id)) {
        _msIDs.delete(id);
        li.classList.remove('lib-selected');
        li.querySelector('.vid-select-cb').textContent = '☐';
      } else {
        _msIDs.add(id);
        li.classList.add('lib-selected');
        li.querySelector('.vid-select-cb').textContent = '☑';
      }
      document.getElementById('ms-count').textContent = _msIDs.size + ' selected';
    }

    function msClearSelection() {
      _msIDs.clear();
      document.querySelectorAll('#video-list li.lib-selected').forEach(function(li) {
        li.classList.remove('lib-selected');
        var cb = li.querySelector('.vid-select-cb');
        if (cb) cb.textContent = '☐';
      });
      document.getElementById('ms-count').textContent = '0 selected';
    }

    function msBulkMove() {
      if (!_msIDs.size) return;
      fetch('/directories/options')
        .then(function(r) { return r.text(); })
        .then(function(html) {
          var wrap = document.createElement('div');
          wrap.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1c1c1c;border:1px solid #444;border-radius:8px;padding:1.25rem;z-index:9999;min-width:260px;box-shadow:0 8px 28px rgba(0,0,0,0.75)';
          wrap.innerHTML = '<h3 style="font-size:0.85rem;color:#ccc;margin:0 0 0.75rem 0">Move ' + _msIDs.size + ' video' + (_msIDs.size > 1 ? 's' : '') + ' to:</h3>'
            + '<select id="ms-bulk-dir" class="input-dark" style="width:100%;margin-bottom:0.6rem"><option value="">— choose folder —</option>' + html + '</select>'
            + '<div style="display:flex;gap:0.5rem;justify-content:flex-end">'
            + '<button class="btn-sm btn-ghost" onclick="this.closest(\'div\').parentNode.remove()">Cancel</button>'
            + '<button class="btn-sm btn-success" onclick="msBulkMoveConfirm(this.closest(\'div\'),this)">Move</button></div>';
          document.body.appendChild(wrap);
        });
    }

    function msBulkMoveConfirm(wrap, btn) {
      var dirID = document.getElementById('ms-bulk-dir').value;
      if (!dirID) return;
      btn.disabled = true;
      var ids = Array.from(_msIDs);
      var done = 0;
      var prog = document.getElementById('ms-progress');
      function next() {
        if (!ids.length) {
          if (prog) prog.textContent = 'Done!';
          setTimeout(function(){ if(prog) prog.textContent=''; }, 2000);
          wrap.remove();
          msClearSelection();
          htmx.ajax('GET', '/videos', {target: '#video-list', swap: 'innerHTML'});
          return;
        }
        var id = ids.shift();
        done++;
        if (prog) prog.textContent = 'Moving ' + done + '/' + (done + ids.length) + '…';
        var fd = new FormData(); fd.append('dir_id', dirID);
        fetch('/videos/' + id + '/move', {method: 'POST', body: fd})
          .then(function(){ next(); })
          .catch(function(){ next(); });
      }
      next();
    }

    function msBulkTag() {
      if (!_msIDs.size) return;
      var name = prompt('Tag name to add to ' + _msIDs.size + ' video(s):');
      if (!name || !name.trim()) return;
      name = name.trim();
      var ids = Array.from(_msIDs);
      var done = 0;
      var prog = document.getElementById('ms-progress');
      function next() {
        if (!ids.length) {
          if (prog) prog.textContent = 'Done!';
          setTimeout(function(){ if(prog) prog.textContent=''; }, 2000);
          return;
        }
        var id = ids.shift();
        done++;
        if (prog) prog.textContent = 'Tagging ' + done + '/' + (done + ids.length) + '…';
        var fd = new FormData(); fd.append('tag', name);
        fetch('/videos/' + id + '/tags', {method: 'POST', body: fd})
          .then(function(){ next(); })
          .catch(function(){ next(); });
      }
      next();
    }

    // Re-apply vid-select-cb visibility after video list is re-rendered
    document.body.addEventListener('htmx:afterSettle', function(e) {
      if (e.detail.target && e.detail.target.id === 'video-list') {
        var isMs = document.body.classList.contains('multi-select-mode');
        document.querySelectorAll('#video-list .vid-select-cb').forEach(function(cb) {
          cb.style.display = isMs ? 'inline-flex' : 'none';
        });
        applyGroupBackgrounds();
      }
    });
  </script>

  <!-- ── Folder background logic ───────────────────────────────────── -->
  <script>
    function applyGroupBackgrounds() {
      fetch('/api/folder-backgrounds')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          Object.keys(data).forEach(function(show) {
            var imgPath = data[show];
            if (!imgPath) return;
            var els = document.querySelectorAll('#video-list details[data-group="' + CSS.escape(show) + '"]');
            els.forEach(function(el) {
              el.style.backgroundImage = 'url(/api/serve-image?path=' + encodeURIComponent(imgPath) + ')';
              el.classList.add('group-has-bg');
              var sum = el.querySelector('summary');
              if (sum) {
                sum.style.backgroundImage = 'url(/api/serve-image?path=' + encodeURIComponent(imgPath) + ')';
              }
            });
          });
        })
        .catch(function(){});
    }

    function setGroupBg(showName) {
      var path = prompt('Image path for "' + showName + '":\n(Leave empty to clear)');
      if (path === null) return;
      var fd = new FormData();
      fd.append('show', showName);
      fd.append('path', path.trim());
      fetch('/api/folder-background', {method: 'POST', body: fd})
        .then(function(r) {
          if (!r.ok) { alert('Failed to save background'); return; }
          applyGroupBackgrounds();
        });
    }
  </script>

  <!-- ── Context menu logic ─────────────────────────────────────────── -->
  <script>
    var _ctx = {id: null, dirID: null, filename: null, dirPath: null};

    function showCtxMenu(e, li) {
      e.preventDefault();
      e.stopPropagation();
      _ctx.id       = li.dataset.videoId;
      _ctx.dirID    = li.dataset.dirId;
      _ctx.filename = li.dataset.filename;
      _ctx.dirPath  = li.dataset.dirPath;

      document.getElementById('ctx-title').textContent = titleEl ? titleEl.dataset.title : _ctx.filename;

      // Reset sub-panels
      document.getElementById('ctx-move-panel').style.display = 'none';
      document.getElementById('ctx-tag-panel').style.display  = 'none';
      document.getElementById('ctx-del-panel').style.display  = 'none';

      var menu = document.getElementById('ctx-menu');
      menu.style.left = e.clientX + 'px';
      menu.style.top  = e.clientY + 'px';
      menu.style.display = 'block';

      // Clamp to viewport after layout
      requestAnimationFrame(function() {
        var r = menu.getBoundingClientRect();
        if (r.right  > window.innerWidth  - 4) menu.style.left = (e.clientX - r.width)  + 'px';
        if (r.bottom > window.innerHeight - 4) menu.style.top  = (e.clientY - r.height) + 'px';
      });
    }

    function hideCtxMenu() {
      document.getElementById('ctx-menu').style.display = 'none';
    }

    // Use capture phase so this runs before any onclick/HTMX handlers on
    // the underlying element — prevents accidental ✕ clicks etc. when
    // the user clicks outside to dismiss the menu.
    document.addEventListener('click', function(e) {
      var menu = document.getElementById('ctx-menu');
      if (menu.style.display === 'none') return;
      if (!menu.contains(e.target)) {
        e.stopImmediatePropagation();
        e.preventDefault();
        hideCtxMenu();
      }
    }, true);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') hideCtxMenu(); });

    // ── Move ──────────────────────────────────────────────────────────
    function ctxMoveToggle() {
      var panel = document.getElementById('ctx-move-panel');
      document.getElementById('ctx-del-panel').style.display = 'none';
      document.getElementById('ctx-tag-panel').style.display = 'none';
      if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
      panel.innerHTML = '<div class="ctx-item" style="color:#555;cursor:default">Loading…</div>';
      panel.style.display = 'block';
      fetch('/api/directories')
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function(dirs) {
          panel.innerHTML = '';
          if (!dirs.length) {
            panel.innerHTML = '<div class="ctx-item" style="color:#555;cursor:default">No directories registered</div>';
            return;
          }
          dirs.forEach(function(d) {
            var isCurrent = String(d.id) === String(_ctx.dirID);
            var btn = document.createElement('button');
            btn.className = 'ctx-item';
            btn.style.cssText = 'width:100%;text-align:left;padding-left:1.4rem';
            btn.title = d.path;
            var label = d.path.split('/').filter(Boolean).pop() || d.path;
            if (isCurrent) {
              btn.textContent = label;
              var cur = document.createElement('span');
              cur.textContent = ' (current)';
              cur.style.cssText = 'color:#555;font-size:0.72em';
              btn.appendChild(cur);
              btn.disabled = true;
              btn.style.opacity = '0.45';
              btn.style.cursor = 'default';
            } else {
              btn.textContent = '⊞ ' + label;
              btn.onclick = function() { ctxDoMove(d.id); };
            }
            panel.appendChild(btn);
          });
        })
        .catch(function(err) {
          panel.innerHTML = '<div class="ctx-item" style="color:#f87;cursor:default">Failed to load: ' + err.message + '</div>';
        });
    }

    function ctxDoMove(dirID) {
      var id = _ctx.id;
      hideCtxMenu();
      var form = new FormData();
      form.append('dir_id', dirID);
      fetch('/videos/' + id + '/move', {method: 'POST', body: form})
        .then(function(r) {
          if (!r.ok) return r.text().then(function(t) { alert('Move failed: ' + t); });
          return r.text().then(function(html) {
            document.getElementById('video-list').innerHTML = html;
            htmx.process(document.getElementById('video-list'));
            applyRandDirPrefs();
          });
        })
        .catch(function(err) { alert('Move failed: ' + err.message); });
    }

    // ── Tag ───────────────────────────────────────────────────────────
    function ctxTagToggle() {
      var panel = document.getElementById('ctx-tag-panel');
      document.getElementById('ctx-move-panel').style.display = 'none';
      document.getElementById('ctx-del-panel').style.display  = 'none';
      if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
      document.getElementById('ctx-tag-input').value = '';
      document.getElementById('ctx-tag-status').textContent = '';
      panel.style.display = 'block';
      document.getElementById('ctx-tag-input').focus();
      // Populate existing tag chips
      var chips = document.getElementById('ctx-tag-chips');
      chips.innerHTML = '';
      fetch('/api/tags')
        .then(function(r) { return r.json(); })
        .then(function(tags) {
          tags.forEach(function(t) {
            if (t.name.indexOf(':') !== -1) return; // skip system tags
            var btn = document.createElement('button');
            btn.className = 'preset-chip';
            btn.textContent = t.name;
            btn.onclick = function() { ctxDoTag(t.name); };
            chips.appendChild(btn);
          });
        });
    }

    function ctxDoTag(name) {
      name = (name || '').trim();
      if (!name) return;
      var id = _ctx.id;
      var status = document.getElementById('ctx-tag-status');
      var form = new FormData();
      form.append('tag', name);
      fetch('/videos/' + id + '/tags', {method: 'POST', body: form})
        .then(function(r) {
          if (!r.ok) return r.text().then(function(t) { status.style.color = '#f87'; status.textContent = t; });
          status.style.color = '#4a9';
          status.textContent = '✓ Tagged "' + name + '"';
          document.getElementById('ctx-tag-input').value = '';
          // Refresh the tag filter strip so the new tag appears
          htmx.ajax('GET', '/tags', {target: '#tag-filters', swap: 'innerHTML'});
        });
    }

    // ── Rename ────────────────────────────────────────────────────────
    function ctxRename() {
      var id = _ctx.id, old = _ctx.filename, dir = _ctx.dirPath;
      hideCtxMenu();
      var newName = prompt('Rename to:', old);
      if (!newName || newName === old) return;
      var form = new FormData();
      form.append('name', newName);
      fetch('/videos/' + id + '/rename', {method: 'POST', body: form})
        .then(function(r) {
          if (!r.ok) return r.text().then(function(t) { alert('Rename failed: ' + t); });
          return r.text().then(function(html) {
            document.getElementById('video-list').innerHTML = html;
            htmx.process(document.getElementById('video-list'));
            applyRandDirPrefs();
          });
        });
    }

    // ── Delete ────────────────────────────────────────────────────────
    function ctxDeleteToggle() {
      var panel = document.getElementById('ctx-del-panel');
      document.getElementById('ctx-move-panel').style.display = 'none';
      panel.style.display = panel.style.display !== 'none' ? 'none' : 'block';
    }

    // ── Tag "…More" popup ──────────────────────────────────────────────
    var _tagMoreData = [];

    function checkTagMoreBtn() {
      var list = document.querySelector('.tag-filter-list');
      var wrap = document.getElementById('tag-more-wrap');
      if (!list || !wrap) return;
      wrap.style.display = list.scrollHeight > list.clientHeight + 2 ? 'flex' : 'none';
    }

    function tagMoreOpen(e) {
      e.stopPropagation();
      var popup = document.getElementById('tag-more-popup');
      if (popup.style.display !== 'none') { popup.style.display = 'none'; return; }

      var btn = document.getElementById('tag-more-btn');
      var r = btn.getBoundingClientRect();
      popup.style.left = r.left + 'px';
      popup.style.top  = (r.bottom + 5) + 'px';
      popup.style.display = 'block';

      var input = document.getElementById('tag-more-search');
      input.value = '';
      input.focus();

      fetch('/api/tags')
        .then(function(r) { return r.json(); })
        .then(function(tags) {
          _tagMoreData = tags.sort(function(a, b) { return a.name.localeCompare(b.name); });
          tagMoreRender(_tagMoreData);
        });

      // Clamp to viewport after layout
      requestAnimationFrame(function() {
        var r2 = popup.getBoundingClientRect();
        if (r2.right  > window.innerWidth  - 4) popup.style.left = (window.innerWidth  - r2.width  - 4) + 'px';
        if (r2.bottom > window.innerHeight - 4) popup.style.top  = (r.top - r2.height  - 4) + 'px';
      });
    }

    function tagMoreFilter(q) {
      q = q.toLowerCase();
      tagMoreRender(_tagMoreData.filter(function(t) {
        return t.name.toLowerCase().indexOf(q) !== -1;
      }));
    }

    function tagMoreRender(tags) {
      var list  = document.getElementById('tag-more-list');
      var active = document.getElementById('active-tag');
      list.innerHTML = '';
      if (!tags.length) {
        list.innerHTML = '<span style="color:#555;font-size:0.78rem">No tags found</span>';
        return;
      }
      tags.forEach(function(t) {
        var btn = document.createElement('button');
        btn.className = 'btn-sm tag-filter-btn';
        btn.style.borderRadius = '12px';
        if (active && active.value == t.id) {
          btn.style.background    = '#1a3a2a';
          btn.style.borderColor   = '#4a9a4a';
          btn.style.color         = '#8f8';
        }
        // Display namespace tags with dimmed prefix
        var colon = t.name.indexOf(':');
        if (colon !== -1) {
          var ns   = document.createElement('span');
          ns.style.cssText = 'opacity:0.45;font-size:0.75em';
          ns.textContent   = t.name.slice(0, colon + 1);
          var val  = document.createTextNode(t.name.slice(colon + 1));
          btn.appendChild(ns);
          btn.appendChild(val);
        } else {
          btn.textContent = t.name;
        }
        btn.onclick = function() {
          toggleTagFilter(t.id);
          document.getElementById('tag-more-popup').style.display = 'none';
        };
        list.appendChild(btn);
      });
    }

    document.addEventListener('click', function(e) {
      var popup = document.getElementById('tag-more-popup');
      var btn   = document.getElementById('tag-more-btn');
      if (popup && !popup.contains(e.target) && e.target !== btn) {
        popup.style.display = 'none';
      }
    });

    // ── Context menu delete ────────────────────────────────────────────
    function ctxDoDelete(mode) {
      var id = _ctx.id;
      hideCtxMenu();
      var url = '/videos/' + id + (mode === 'file' ? '/file' : '');
      fetch(url, {method: 'DELETE'})
        .then(function(r) { return r.text(); })
        .then(function(html) {
          document.getElementById('video-list').innerHTML = html;
          htmx.process(document.getElementById('video-list'));
          applyRandDirPrefs();
        });
    }
  </script>

</body>
