{{range .}}
<div style="border:1px solid #2a2a2a;border-radius:4px;padding:0.5rem;display:flex;flex-direction:column;gap:0.3rem">
  <div style="font-size:0.7rem;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="{{.URL}}">{{.URL}}</div>
  <pre id="ytdlp-out-{{.JobID}}"
    style="font-size:0.72rem;color:#aaa;background:#111;border:1px solid #222;border-radius:4px;
           padding:0.4rem;max-height:8rem;overflow-y:auto;margin:0;white-space:pre-wrap;word-break:break-all"></pre>
  <span id="ytdlp-msg-{{.JobID}}" style="font-size:0.8rem;color:#888"><span class="spinner"></span> Downloading…</span>
</div>
<script>
(function() {
  var pre = document.getElementById('ytdlp-out-{{.JobID}}');
  var msg = document.getElementById('ytdlp-msg-{{.JobID}}');
  var es = new EventSource('/ytdlp/job/{{.JobID}}/events');
  es.onmessage = function(e) {
    pre.textContent += e.data + '\n';
    pre.scrollTop = pre.scrollHeight;
  };
  es.addEventListener('done', function() {
    es.close();
    msg.innerHTML = '✓ Done';
    msg.style.color = '#4a9a4a';
    htmx.ajax('GET', '/videos', {target: '#video-list', swap: 'morph:innerHTML'});
    // Auto-remove completed block after 30 seconds.
    setTimeout(function() {
      var block = pre.closest('div');
      if (block) block.remove();
    }, 30000);
  });
  es.addEventListener('error', function(evt) {
    es.close();
    msg.innerHTML = '✗ Failed';
    msg.style.color = '#c44';
  });
  es.onerror = function() {
    if (es.readyState === EventSource.CLOSED) {
      return; // already cleanly closed by done/error handler
    }
    es.close();
    if (msg.textContent.indexOf('✓') === -1 && msg.textContent.indexOf('✗') === -1) {
      msg.innerHTML = '<span style="color:#c44">Connection lost — download may still be running in background.</span>';
    }
  };
})();
</script>
{{end}}
