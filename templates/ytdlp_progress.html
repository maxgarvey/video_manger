{{range .}}
<div style="border:1px solid #2a2a2a;border-radius:4px;padding:0.5rem;display:flex;flex-direction:column;gap:0.3rem">
  <div style="font-size:0.7rem;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="{{.URL}}">{{.URL}}</div>
  <pre id="ytdlp-out-{{.JobID}}"
    style="font-size:0.72rem;color:#aaa;background:#111;border:1px solid #222;border-radius:4px;
           padding:0.4rem;max-height:8rem;overflow-y:auto;margin:0;white-space:pre-wrap;word-break:break-all"></pre>
  <span id="ytdlp-msg-{{.JobID}}" style="font-size:0.8rem;color:#888"><span class="spinner"></span> Downloading…</span>
</div>
<script>
(function() {
  var pre = document.getElementById('ytdlp-out-{{.JobID}}');
  var msg = document.getElementById('ytdlp-msg-{{.JobID}}');
  var es = new EventSource('/ytdlp/job/{{.JobID}}/events');

  // Track the last [download] progress line so we can update it in-place
  // rather than appending a new line for every percentage tick.
  var lastProgressSpan = null;

  es.onmessage = function(e) {
    var line = e.data;
    var isProgress = line.indexOf('[download]') === 0 && line.indexOf('%') !== -1;
    if (isProgress && lastProgressSpan) {
      // Overwrite the previous progress line in-place.
      lastProgressSpan.textContent = line + '\n';
    } else {
      var span = document.createElement('span');
      span.textContent = line + '\n';
      pre.appendChild(span);
      lastProgressSpan = isProgress ? span : null;
    }
    pre.scrollTop = pre.scrollHeight;
  };

  es.addEventListener('videoReady', function(e) {
    try {
      var data = JSON.parse(e.data);
      if (data.id && typeof openTab === 'function') {
        openTab(data.id, data.title || 'Video ' + data.id);
      }
    } catch(_) {}
  });

  es.addEventListener('done', function() {
    es.close();
    msg.innerHTML = '&#10003; Done';
    msg.style.color = '#4a9a4a';
    htmx.ajax('GET', '/videos', {target: '#video-list', swap: 'innerHTML'});
    // Auto-remove completed block after 30 seconds.
    setTimeout(function() {
      var block = pre.closest('div');
      if (block) block.remove();
    }, 30000);
  });

  // downloadError is the server-sent named event for a failed download.
  // We deliberately do NOT use addEventListener('error', ...) because that
  // event name is also fired natively by the browser for connection issues,
  // which would overwrite the ✓ Done state when the server closes the SSE
  // connection after a successful download.
  es.addEventListener('downloadError', function(evt) {
    es.close();
    msg.innerHTML = '&#10007; Failed: ' + (evt.data || 'unknown error');
    msg.style.color = '#c44';
  });

  // onerror handles native connection failures only.
  es.onerror = function() {
    if (es.readyState === EventSource.CLOSED) {
      return; // already cleanly closed by done/downloadError handler
    }
    es.close();
    if (msg.textContent.indexOf('\u2713') === -1 && msg.textContent.indexOf('\u2717') === -1) {
      msg.innerHTML = '<span style="color:#c44">Connection lost — download may still be running in background.</span>';
    }
  };
})();
</script>
{{end}}
