{{if .}}
<div class="tag-filter-list" style="max-height:3.8rem;overflow:hidden">
  {{range .}}
  <button class="btn-sm tag-filter-btn"
    id="tag-btn-{{.ID}}"
    onclick="toggleTagFilter({{.ID}})"
    style="border-radius:12px"
  >{{- $parts := splitTagName .Name -}}
  {{- if $parts.Namespace -}}<span style="opacity:0.45;font-size:0.75em">{{$parts.Namespace}}:</span>{{$parts.Value}}
  {{- else -}}{{.Name}}
  {{- end -}}</button>
  {{end}}
</div>
{{else}}
<p style="color:#555;font-size:0.8rem">No tags yet.</p>
{{end}}
