<div style="background:#1a1a1a;border:1px solid #444;border-radius:6px;padding:1rem;margin-top:0.5rem">
  <h3 style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:#888;margin:0 0 0.5rem">
    ✂ Trim — select the region to <strong style="color:#5af">keep</strong>
  </h3>

  <!-- Dual-handle range bar -->
  <div id="trim-bar-{{.}}" style="position:relative;height:28px;margin:0.4rem 0 0.6rem;user-select:none">
    <!-- track background -->
    <div style="position:absolute;top:50%;left:0;right:0;height:4px;background:#333;border-radius:2px;transform:translateY(-50%)"></div>
    <!-- highlighted keep-region -->
    <div id="trim-region-{{.}}" style="position:absolute;top:50%;height:4px;background:#2563eb;border-radius:2px;transform:translateY(-50%);left:0%;right:0%"></div>
    <!-- start range input (underneath, pointer-events: none except thumb via CSS hack) -->
    <input type="range" id="trim-rs-{{.}}" min="0" max="1000" value="0" step="1"
      style="position:absolute;width:100%;top:0;left:0;height:100%;margin:0;opacity:0;cursor:pointer;z-index:2"
      oninput="trimRangeInput('{{.}}')">
    <!-- end range input -->
    <input type="range" id="trim-re-{{.}}" min="0" max="1000" value="1000" step="1"
      style="position:absolute;width:100%;top:0;left:0;height:100%;margin:0;opacity:0;cursor:pointer;z-index:3"
      oninput="trimRangeInput('{{.}}')">
    <!-- visible thumbs -->
    <div id="trim-ts-{{.}}" style="position:absolute;top:50%;width:12px;height:20px;background:#2563eb;border-radius:3px;transform:translate(-50%,-50%);left:0%;pointer-events:none;z-index:4"></div>
    <div id="trim-te-{{.}}" style="position:absolute;top:50%;width:12px;height:20px;background:#2563eb;border-radius:3px;transform:translate(-50%,-50%);left:100%;pointer-events:none;z-index:4"></div>
  </div>

  <form hx-post="/videos/{{.}}/trim"
        hx-target="#video-list"
        hx-indicator="#trim-status-{{.}}"
        style="display:flex;flex-direction:column;gap:0.4rem">
    <div style="display:grid;grid-template-columns:auto 1fr;gap:0.3rem 0.5rem;align-items:center;font-size:0.82rem">
      <label style="color:#888;white-space:nowrap">Start</label>
      <input type="text" id="trim-start-{{.}}" name="start" placeholder="0:00 or 0" value="0"
        style="background:#222;border:1px solid #444;color:#eee;padding:0.25rem 0.4rem;border-radius:4px;font-size:0.82rem;font-family:monospace"
        oninput="trimTextInput('{{.}}','start')">
      <label style="color:#888;white-space:nowrap">End</label>
      <input type="text" id="trim-end-{{.}}" name="end" placeholder="end of video"
        style="background:#222;border:1px solid #444;color:#eee;padding:0.25rem 0.4rem;border-radius:4px;font-size:0.82rem;font-family:monospace"
        oninput="trimTextInput('{{.}}','end')">
    </div>
    <div style="font-size:0.72rem;color:#555">
      Drag the blue handles or type times to set the region to keep.<br>
      Accepts <code style="color:#666">HH:MM:SS</code>, <code style="color:#666">MM:SS</code>, or seconds.
      Output: <code style="color:#666">filename_trim.ext</code>
    </div>
    <button type="submit" class="btn-success btn-sm" style="align-self:flex-start"
      hx-confirm="Trim to the selected region? A new file will be created.">✂ Trim</button>
  </form>
  <div id="trim-status-{{.}}" class="htmx-indicator" style="font-size:0.78rem;color:#888;margin-top:0.4rem">
    <span class="spinner"></span> Trimming…
  </div>
</div>

<script>
(function(){
  var vid = '{{.}}';
  var video = document.getElementById('vid-' + vid);
  var STEPS = 1000; // slider resolution

  function parseSecs(v) {
    v = (v || '').trim();
    if (!v) return NaN;
    var p = v.split(':');
    if (p.length === 3) return (+p[0])*3600 + (+p[1])*60 + (+p[2]);
    if (p.length === 2) return (+p[0])*60 + (+p[1]);
    return +p[0];
  }

  function fmtSecs(s) {
    s = Math.round(s);
    var m = Math.floor(s/60), sec = s%60;
    return m + ':' + (sec<10?'0':'')+sec;
  }

  function duration() {
    return (video && video.duration && isFinite(video.duration)) ? video.duration : 0;
  }

  function updateBar(startSec, endSec) {
    var dur = duration();
    if (dur <= 0) return;
    var s = Math.max(0, Math.min(startSec/dur, 1));
    var e = Math.max(0, Math.min(endSec/dur, 1));
    document.getElementById('trim-region-'+vid).style.left  = (s*100)+'%';
    document.getElementById('trim-region-'+vid).style.right = ((1-e)*100)+'%';
    document.getElementById('trim-ts-'+vid).style.left = (s*100)+'%';
    document.getElementById('trim-te-'+vid).style.left = (e*100)+'%';
    document.getElementById('trim-rs-'+vid).value = Math.round(s*STEPS);
    document.getElementById('trim-re-'+vid).value = Math.round(e*STEPS);
  }

  // Called when range sliders move
  window.trimRangeInput = window.trimRangeInput || {};
  window.trimRangeInput = function(id) {
    if (id !== vid) return;
    var dur = duration();
    if (dur <= 0) return;
    var rs = +document.getElementById('trim-rs-'+id).value;
    var re = +document.getElementById('trim-re-'+id).value;
    // Prevent handles crossing: clamp
    if (rs >= re) { rs = re - 1; document.getElementById('trim-rs-'+id).value = rs; }
    var startSec = (rs/STEPS)*dur;
    var endSec   = (re/STEPS)*dur;
    document.getElementById('trim-start-'+id).value = fmtSecs(startSec);
    document.getElementById('trim-end-'+id).value   = fmtSecs(endSec);
    updateBar(startSec, endSec);
    // Seek video to whichever handle was last moved (start handle is lower z-index)
    var active = (document.activeElement && document.activeElement.id);
    if (video) video.currentTime = active === 'trim-re-'+id ? endSec : startSec;
  };

  // Called when text inputs change
  window.trimTextInput = window.trimTextInput || {};
  window.trimTextInput = function(id, which) {
    if (id !== vid) return;
    var dur = duration();
    var startSec = parseSecs(document.getElementById('trim-start-'+id).value);
    var endSec   = parseSecs(document.getElementById('trim-end-'+id).value);
    if (isNaN(startSec)) startSec = 0;
    if (isNaN(endSec))   endSec   = dur;
    updateBar(startSec, endSec);
    if (video) video.currentTime = which === 'end' ? endSec : startSec;
  };

  // Initialise once duration is known
  function init() {
    var dur = duration();
    if (dur > 0) {
      var startSec = parseSecs(document.getElementById('trim-start-'+vid).value) || 0;
      var endEl    = document.getElementById('trim-end-'+vid);
      var endSec   = endEl.value ? parseSecs(endEl.value) : dur;
      updateBar(startSec, endSec);
    }
  }

  if (video) {
    if (video.readyState >= 1 && isFinite(video.duration)) {
      init();
    } else {
      video.addEventListener('loadedmetadata', init, {once:true});
    }
  }
})();
</script>
