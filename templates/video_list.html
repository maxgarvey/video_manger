{{if .Videos}}
<ul style="list-style:none;display:flex;flex-direction:column;gap:0.15rem">
  {{range .Videos}}
  <li style="display:flex;align-items:center;gap:0.2rem">
    {{$w := index $.History .ID}}
    <button
      onclick="openTab(Number(this.dataset.id), this.dataset.title)"
      data-id="{{.ID}}"
      data-title="{{.Title}}"
      class="btn-sm"
      style="flex:1;text-align:left;display:flex;align-items:center;gap:0.3rem;min-width:0;padding:0.35rem 0.6rem"
      title="{{.Title}} ({{.Filename}})"
    >
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.85rem">
        {{if (index $.History .ID).WatchedAt}}<span title="Watched" style="color:#4a9;font-size:0.68rem">✓</span> {{end}}{{if eq .Rating 2}}<span title="Favourite" style="font-size:0.68rem">⭐</span> {{else if eq .Rating 1}}<span title="Liked" style="font-size:0.68rem">👍</span> {{end}}{{.Title}}
      </span>
      <span style="flex-shrink:0;color:#444;font-size:0.68rem;font-family:monospace">{{ext .Filename}}</span>
      {{if $w.WatchedAt}}<span style="flex-shrink:0;color:#3a5a3a;font-size:0.68rem">{{reltime $w.WatchedAt}}</span>{{end}}
    </button>
    <button class="btn-icon"
      hx-get="/videos/{{.ID}}/delete-confirm"
      hx-target="closest li"
      hx-swap="outerHTML"
      style="flex-shrink:0;font-size:0.78rem"
      title="Delete"
    >✕</button>
  </li>
  {{end}}
</ul>
{{else}}
<p style="color:#555;font-size:0.85rem">No videos found.<br>Add a directory to get started.</p>
{{end}}
