{{if .Videos}}
<ul style="list-style:none;display:flex;flex-direction:column;gap:0.3rem">
  {{range .Videos}}
  <li style="display:flex;align-items:center;gap:0.25rem">
    {{$w := index $.History .ID}}
    <button
      hx-get="/play/{{.ID}}"
      hx-target="#player"
      style="flex:1;text-align:left;overflow:hidden;display:flex;flex-direction:column;gap:0.15rem;align-items:flex-start"
      title="{{.Title}} ({{.Filename}})"
    ><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%">{{if index $.Watched .ID}}<span title="Watched" style="color:#4a9;margin-right:0.3rem;font-size:0.75rem">✓</span>{{end}}{{if eq .Rating 2}}<span title="Favourite" style="margin-right:0.2rem;font-size:0.75rem">⭐</span>{{else if eq .Rating 1}}<span title="Liked" style="margin-right:0.2rem;font-size:0.75rem">👍</span>{{end}}{{.Title}}</span>{{if $w.WatchedAt}}<span style="font-size:0.7rem;color:#555">{{reltime $w.WatchedAt}}</span>{{end}}</button>
    <button class="btn-icon"
      hx-get="/videos/{{.ID}}/delete-confirm"
      hx-target="closest li"
      hx-swap="outerHTML"
      style="flex-shrink:0"
      title="Delete"
    >✕</button>
  </li>
  {{end}}
</ul>
{{else}}
<p style="color:#555;font-size:0.85rem">No videos found.<br>Add a directory to get started.</p>
{{end}}
